description: >
  Publish release notes for current tag release to Slack

parameters:
  slack-channel:
    type: string
  app-name:
    type: string
  release-tag:
    type: string

steps:
  - run:
      name: Reading release name
      command: |
        RELEASE_NAME=$(echo "<< parameters.release-tag >>" | sed 's/^release-//')
        echo "export RELEASE_NAME='${RELEASE_NAME}'" >> $BASH_ENV
        echo "Found release ${RELEASE_NAME}"
  - run:
      name: Fetch release notes
      command: |
        echo "Checking release release-${RELEASE_NAME}"
        REPO_API_URL=$(echo "${CIRCLE_REPOSITORY_URL}/" | sed 's|.git/$||' | sed 's|git@github.com:|https://api.github.com/repos/|')
        curl --retry 3 --silent --show-error "${REPO_API_URL}/releases/tags/<< parameters.release-tag >>" | jq .body > release-notes.txt
  - run:
      name: Cleaning up notes
      command: |
        cat release-notes.txt | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | sed 's/`/\\`/g' > cleaned-release-notes.txt
        echo 'export RELEASE_NOTES=$(< cleaned-release-notes.txt)' >> $BASH_ENV
  - run:
      name: Display release notes
      command: echo "${RELEASE_NOTES}"
  - run:
      name: debug
      command: |
        echo "$SLACK_TEMPLATE"
        echo "========================================="
        T2=$(eval echo \""$SLACK_TEMPLATE"\")
        echo "$T2"
      environment:
        SLACK_TEMPLATE: "<<include(templates/slack-release-notification.json)>>"

  - slack/notify:
      channel: << parameters.slack-channel >>
      event: pass
      custom: |
        {
          "blocks": [
            {
              "type": "header",
              "text": {
                "type": "plain_text",
                "text": "New release $RELEASE_NAME for << parameters.app-name >> :tada:",
                "emoji": true
              }
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": $RELEASE_NOTES
              }
            }
          ]
        }
